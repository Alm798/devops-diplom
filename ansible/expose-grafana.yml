---
- name: Публикация Grafana через Ingress
  hosts: k8s_master
  become: false

  tasks:
    - name: Создание Ingress для Grafana
      shell: |
        cat <<MANIFEST | kubectl apply -f -
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: grafana-ingress
          namespace: monitoring
        spec:
          ingressClassName: nginx
          rules:
          - host: grafana.local
            http:
              paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: monitoring-grafana
                    port:
                      number: 80
        MANIFEST

    - name: Проверка Ingress Grafana
      command: kubectl get ingress -n monitoring
      register: grafana_ingress
      changed_when: false

    - name: Вывод Ingress Grafana
      debug:
        var: grafana_ingress.stdout_lines
